<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body style="height: 100vh; display: flex; flex-direction: column;">
    <header class="text-center row">
        <div class="col-2 col-md-5">
            <img id="menuicon" class="menuicon col-12 col-sm-9 col-md-3 col-lg-1" src="Ikony/menu.png" alt="" style="float: left;">
        </div>
        <input type="text" class="px-3 wyszukiwanie rounded-5 border-0 col-8 col-md-3 h-100">
        <div class="col-2 col-md-4">
            <img id="accicon" class="accicon col-7 col-sm-5 col-md-2 col-lg-1" src="Ikony/konto.png" alt="" style="float: right;">
        </div>
    </header>
    <div style="display: flex;">
        <aside class="kategorie col-3">
            <div class="p-3">
                <h2 class="kolorowy">Kategorie:</h2>
                <ul>
                    <li>Wszystkie przedmioty <img class="ikonki" src="Ikony/Wszystko.png" alt=""></li>
                    <li>Opakowania <img class="ikonki" src="Ikony/opakowania.png" alt=""></li>
                    <li>Folie i zabezpieczenia <img class="ikonki" src="Ikony/Folie.png" alt=""></li>
                    <li>Erykiety <img class="ikonki" src="Ikony/Etykiety.png" alt=""></li>
                    <li>Sprzęt <img class="ikonki" src="Ikony/Narzedzia.png" alt=""></li>
                </ul>
            </div>
           
            <hr style="color: white; border-width: 4px;">

            <div style="color: white;" class="px-4">
                <h2><b>Sortuj według:</b></h2><br>
                <ul>
                    <li><b>Cena</b></li>
                </ul>
                Od najniższej <input type="radio" name="cenaSort" value="odNajmniejszej"> <br>
                Od najwyższej <input type="radio" name="cenaSort" value="odNajwiekszej"> <br><br>
                Od <input class="w-25 rounded-5 px-2" type="number" min="0" name="cenaOd"> Do <input class="px-2 w-25 rounded-5" type="number" min="1" name="cenaDo"> <br><br>
                Alfabetycznie <input type="radio" name="cenaSort" value="Alfabetycznie">
            </div>
        </aside>
        <main class="homepage col-12 col-md-9 overflow-y-scroll">
            <div class="col-7 m-3 py-1 px-3 rounded-4 text-center text-light" style="background-color: darkgray;"><h1 id="Napis">Wszystkie przedmioty</h1></div>
        </main>
    </div>
    
    <footer></footer>
</body>
</html>
