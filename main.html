<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body style="height: 100vh; display: flex; flex-direction: column;">
    <header class="row d-flex flex-column align-items-center container-fluid">
        <div class="col-2 col-md-4">
            <img id="menuicon" class="menuicon img-fluid col-md-3 col-xl-2 powieksz" src="Ikony/menu.png" alt="" style="float: left;">
        </div>
        <input type="text" class="wyszukiwanie rounded-5 border-0 col-7 col-md-3 h-75">
        <div class="col-2 col-md-4 col-lg-3 d-flex pt-2">
            <div class="col-md-6 col-lg-10"></div>
            <a href="koszyk.html" class="col-8 col-md-2 col-lg-2 col-xl-1 powieksz"><img src="Ikony/koszyk2.png" alt="" class="img-fluid"></a>
            <a href="konto.html" class="col-8 col-md-2 col-lg-2 col-xl-1 powieksz"><img id="accicon" class="accicon img-fluid" src="Ikony/konto.png" alt="" ></a>
        </div>
    </header>
    <div style="display: flex;" class="h-100">
        <aside class="kategorie col-3">
            <div class="p-3">
                <h2 class="kolorowy">Kategorie:</h2>
                <ul class="lista">
                    <li>Wszystkie przedmioty <img class="ikonki" src="Ikony/Wszystko.png" alt=""></li>
                    <li>Opakowania <img class="ikonki" src="Ikony/opakowania.png" alt=""></li>
                    <li>Folie i zabezpieczenia <img class="ikonki" src="Ikony/Folie.png" alt=""></li>
                    <li>Etykiety <img class="ikonki" src="Ikony/Etykiety.png" alt=""></li>
                    <li>Sprzęt <img class="ikonki" src="Ikony/Narzedzia.png" alt=""></li>
                </ul>
            </div>
           
            <hr style="color: white; border-width: 4px;">

            <div style="color: white;" class="px-4">
                <h2><b>Sortuj według:</b></h2><br>
                <ul>
                    <li><b>Cena</b></li>
                </ul>
                Od najniższej <input type="radio" name="cenaSort" value="odNajmniejszej"> <br>
                Od najwyższej <input type="radio" name="cenaSort" value="odNajwiekszej"> <br><br>
                Od <input class="w-25 rounded-5 px-2" type="number" min="0" name="cenaOd"> Do <input class="px-2 w-25 rounded-5" type="number" min="1" name="cenaDo"> <br><br>
                Alfabetycznie <input type="radio" name="cenaSort" value="Alfabetycznie">
            </div>
        </aside>
        <main class="homepage col-12 col-md-9 overflow-y-scroll">
            <div class="Digga col-7 m-3 py-1 px-3 rounded-4 text-center text-light" style="background-color: rgba(169, 169, 169, 0.41);"><h1 id="Napis">Wszystkie przedmioty</h1></div>
            <div class="">
                    <div class="rounded-4 d-flex flex-column m-4 col-6 col-sm-4 col-md-3 produkt powieksz" style="background-color: #d9d9d96a;">
                        <a href="produkt.html" class="text-decoration-none text-dark">
                            <div><img class="img-fluid" src="Zdjecia/Skaner.png" alt=""></div>
                    <div class="podtekst rounded-4 p-3 text-center" style="background-color: #c2dcff7b;">Skaner <br> <br> 450zł</div>
                        </a>
                    
            </div>

            </div>
            
        </main>
    </div>
    
    <footer></footer>
</body>
</html>
